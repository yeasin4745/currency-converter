<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Professional Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="notificationContainer" class="notification-container"></div>
    <div class="container">
        <div class="converter-card">
            <div class="theme-switch-wrapper">
                <button id="themeToggle" class="theme-switch-btn" title="Toggle dark/light mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            
            <div class="header">
                <h1><i class="fas fa-coins"></i> Currency Converter</h1>
                <p class="subtitle">Real-time exchange rates for global markets</p>
            </div>

            <div class="converter-body">
                <div class="input-group">
                    <label for="amount">Amount to Convert</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i class="fas fa-wallet"></i></span>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00" 
                            value="1"
                            min="0"
                            step="0.01"
                        >
                    </div>
                </div>

                <div class="currency-row">
                    <div class="input-group flex-1">
                        <label for="fromCurrency">From</label>
                        <div class="select-wrapper">
                            <input type="text" id="fromSearch" class="currency-search" placeholder="Search currency...">
                            <select id="fromCurrency" class="currency-select">
                            </select>
                        </div>
                    </div>

                    <div class="swap-container">
                        <button id="swapBtn" class="swap-btn" title="Swap currencies">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                    </div>

                    <div class="input-group flex-1">
                        <label for="toCurrency">To</label>
                        <div class="select-wrapper">
                            <input type="text" id="toSearch" class="currency-search" placeholder="Search currency...">
                            <select id="toCurrency" class="currency-select">
                            </select>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="convertBtn" class="convert-btn">
                        <i class="fas fa-sync-alt"></i> Convert Now
                    </button>
                    <button id="resetBtn" class="reset-btn" title="Reset all fields">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>

                <div class="quick-convert-section">
                    <div class="quick-convert-label">Quick Convert</div>
                    <div class="quick-convert-buttons">
                        <button class="quick-btn" onclick="quickConvert('USD', 'EUR')">USD → EUR</button>
                        <button class="quick-btn" onclick="quickConvert('EUR', 'GBP')">EUR → GBP</button>
                        <button class="quick-btn" onclick="quickConvert('USD', 'INR')">USD → INR</button>
                        <button class="quick-btn" onclick="quickConvert('USD', 'JPY')">USD → JPY</button>
                        <button class="quick-btn" onclick="quickConvert('GBP', 'USD')">GBP → USD</button>
                        <button class="quick-btn" onclick="quickConvert('USD', 'AUD')">USD → AUD</button>
                    </div>
                </div>

                <div id="result" class="result hidden">
                    <div class="result-header">Converted Amount</div>
                    <div class="result-amount-wrapper">
                        <div class="result-amount" id="resultAmount"></div>
                        <button id="copyBtn" class="copy-btn" title="Copy result to clipboard">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div class="exchange-rate-row">
                        <div class="exchange-rate" id="exchangeRate"></div>
                        <div id="rateTrend" class="rate-trend hidden"></div>
                    </div>
                    <div id="amountInWords" class="amount-in-words"></div>
                    <button id="reverseBtn" class="reverse-btn" title="Reverse conversion">
                        <i class="fas fa-arrow-right-arrow-left"></i> Reverse
                    </button>
                </div>

                <div id="comparisonSection" class="comparison-section hidden">
                    <div class="comparison-header">
                        <h3>Multi-Currency Comparison</h3>
                    </div>
                    <div id="comparisonTable" class="comparison-table"></div>
                </div>

                <div id="chartSection" class="chart-section hidden">
                    <div class="chart-header">
                        <h3>Market Overview</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="marketChart"></canvas>
                    </div>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Fetching latest market rates...</p>
                </div>

                <div id="lastUpdated" class="last-updated hidden"></div>

                <div id="error" class="error hidden"></div>

                <div class="favorites-section">
                    <button id="favoriteBtn" class="favorite-btn" title="Add current pair to favorites">
                        <i class="far fa-star"></i> Save to Favorites
                    </button>
                    <div id="favoritesList" class="favorites-list hidden">
                    </div>
                </div>

                <div class="history-section">
                    <button id="historyToggle" class="history-toggle">
                        <i class="fas fa-history"></i> Recent Conversions
                    </button>
                    <div id="historyPanel" class="history-panel hidden">
                        <div class="history-header">
                            <h3>History Log</h3>
                            <button id="clearHistoryBtn" class="clear-history-btn" title="Clear history">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <div id="historyList" class="history-list">
                            <p class="history-empty">No conversions yet</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="footer">
                <p>Built with precision by Yeasin</p>
                <p>Market data powered by Open Exchange Rates API</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
